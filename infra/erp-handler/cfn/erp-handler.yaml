AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  ERP product handler for the LINQ Platform MCP Server. Deploys to the
  linq-erp-dev AWS account: a Lambda implementing erp_checkUserAccess,
  fronted by an API Gateway HTTP API v2 with a JWT authorizer backed by
  a Cognito User Pool. Cross-account access from the Platform MCP server
  uses the OAuth 2.0 client-credentials grant — no cross-account IAM is
  required because the wire is public HTTPS + Bearer token.

  Why JWT and not AWS_IAM auth: cross-account `execute-api:Invoke` is
  blocked at the LINQ org level (verified 2026-05-07). Cognito + JWT
  routes around this entirely; the Platform Lambda mints a token from
  Cognito's public token endpoint and presents it on the wire.

Parameters:
  ErpUsersTableName:
    Type: String
    # LINQ convention: dev tables are prefixed with `dev_`; prod tables
    # have no prefix (matches the verify-user-authorization skill).
    Default: dev_erp_users
  ErpTenantsTableName:
    Type: String
    Default: dev_erp_tenants
  StageName:
    Type: String
    Default: prod
  ErpDdbKmsKeyArn:
    Type: String
    Default: arn:aws:kms:us-east-1:529394632305:key/a2d384af-cdd8-48d8-b42a-6fe837819d4e
    Description: >-
      ARN of the customer-managed KMS key that encrypts dev_erp_users and
      dev_erp_tenants. The Lambda role needs kms:Decrypt on this key for
      DynamoDB GetItem to succeed against the SSE-KMS-encrypted tables.
  CognitoDomainPrefix:
    Type: String
    Default: linq-erp-mcp
    Description: >-
      Prefix for the Cognito-managed domain. Must be globally unique within
      the region. The full domain becomes
      <prefix>.auth.<region>.amazoncognito.com.
  ResourceServerIdentifier:
    Type: String
    Default: linq-erp-mcp
    Description: >-
      Identifier for the Cognito resource server. Combined with the scope
      name produces the fully-qualified scope `<identifier>/<scope>` that
      is requested when minting a token and validated by the JWT authorizer.
  ScopeName:
    Type: String
    Default: erp.invoke

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 15
    Architectures:
      - arm64
    Environment:
      Variables:
        ERP_USERS_TABLE_NAME: !Ref ErpUsersTableName
        ERP_TENANTS_TABLE_NAME: !Ref ErpTenantsTableName
        NODE_OPTIONS: "--enable-source-maps"

Resources:
  # ---- Cognito User Pool — issues JWTs for the Platform MCP server. ------
  # No human users; the pool only hosts a resource server + an M2M app
  # client. Tokens are obtained via the OAuth 2.0 client-credentials grant
  # against the public token endpoint and are validated by the API Gateway
  # JWT authorizer below.
  ErpUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-erp-mcp-pool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  ErpUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref ErpUserPool

  ErpResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref ErpUserPool
      Identifier: !Ref ResourceServerIdentifier
      Name: !Sub "${AWS::StackName}-erp-resource-server"
      Scopes:
        - ScopeName: !Ref ScopeName
          ScopeDescription: Permission to invoke the ERP MCP handler.

  ErpAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ErpResourceServer
    Properties:
      UserPoolId: !Ref ErpUserPool
      ClientName: !Sub "${AWS::StackName}-platform-mcp-client"
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - !Sub "${ResourceServerIdentifier}/${ScopeName}"
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  # ---- HTTP API v2 with JWT authorizer ---------------------------------
  ErpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Auth:
        Authorizers:
          CognitoJwt:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${ErpUserPool}"
              audience:
                - !Ref ErpAppClient
            IdentitySource: $request.header.Authorization
        DefaultAuthorizer: CognitoJwt

  ErpHandlerLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: erp-check-user-access
      Description: erp_checkUserAccess product handler.
      CodeUri: ../
      Handler: index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ErpUsersTableName}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ErpTenantsTableName}"
            # Customer-managed KMS key encrypts both ERP tables. DDB GetItem
            # is gated by kms:Decrypt on this key. Scoped via kms:ViaService
            # so the role can only use the key through DynamoDB, not call
            # KMS directly.
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
              Resource: !Ref ErpDdbKmsKeyArn
              Condition:
                StringEquals:
                  "kms:ViaService": !Sub "dynamodb.${AWS::Region}.amazonaws.com"
      Events:
        CheckUserAccess:
          Type: HttpApi
          Properties:
            ApiId: !Ref ErpApi
            Method: POST
            Path: /erp/checkUserAccess
            Auth:
              Authorizer: CognitoJwt
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: cjs
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/index.ts

Outputs:
  ErpApiUrl:
    Description: Full URL for invoking erp_checkUserAccess.
    Value: !Sub "https://${ErpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/erp/checkUserAccess"
    Export:
      Name: ErpCheckUserAccessUrl

  ErpApiId:
    Description: API Gateway HTTP API ID.
    Value: !Ref ErpApi

  CognitoTokenEndpoint:
    Description: >-
      OAuth 2.0 token endpoint. POST grant_type=client_credentials here
      with the app-client credentials to mint a JWT.
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
    Export:
      Name: ErpCognitoTokenEndpoint

  CognitoIssuer:
    Description: JWT issuer URL — the iss claim baked into minted tokens.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${ErpUserPool}"

  CognitoAudience:
    Description: >-
      JWT audience — the app-client ID. Bound by the API Gateway JWT
      authorizer's `audience` field.
    Value: !Ref ErpAppClient

  CognitoScope:
    Description: Fully-qualified scope to request when minting a token.
    Value: !Sub "${ResourceServerIdentifier}/${ScopeName}"

  CognitoClientId:
    Description: App-client ID. Same value as the JWT audience.
    Value: !Ref ErpAppClient

  CognitoUserPoolId:
    Description: Cognito User Pool ID — needed for retrieving the client secret.
    Value: !Ref ErpUserPool
