AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Auth0 management handler for the LINQ Platform MCP Server. Deploys
  IN-ACCOUNT alongside the platform Lambda (linq-platform-dev). This
  is the first product handler that uses the `lambda-direct` dispatch
  pattern: synchronous Lambda Invoke from the platform Lambda, no
  API Gateway, no Cognito. The platform never sees this handler's
  Auth0 credentials — the handler reads them from its own Secrets
  Manager secret. See docs/dispatch-patterns.md.

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: Reserved for symmetry with sibling handler stacks.
  PlatformMcpLambdaRoleArn:
    Type: String
    Description: >-
      IAM role ARN of the platform-mcp-server Lambda. Granted
      lambda:InvokeFunction on this stack's Auth0HandlerLambda via
      Auth0HandlerInvokePermission. Default reads the cross-stack
      export from the Platform stack.
    Default: ""
  Auth0ManagementSecretName:
    Type: String
    Default: platform-mcp/auth0/management-creds
    Description: >-
      Secrets Manager secret name. Created here as a placeholder; the
      seed-auth0-secret.ts script overwrites the SecretString
      post-deploy with the real Auth0 M2M credentials.

Conditions:
  HasPlatformRoleArn: !Not [!Equals [!Ref PlatformMcpLambdaRoleArn, ""]]

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 512
    Timeout: 30
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_OPTIONS: "--enable-source-maps"
        AUTH0_MANAGEMENT_SECRET_ID: !Ref Auth0ManagementSecretName

Resources:
  # ---- Auth0 Management M2M creds secret (placeholder until seeded) ----
  # The Lambda reads { domain, client_id, client_secret } from this
  # secret at every invocation. CFN creates the secret with placeholder
  # values; scripts/seed-auth0-secret.ts overwrites the SecretString
  # post-deploy with the real Auth0 M2M credentials.
  Auth0ManagementCredsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Ref Auth0ManagementSecretName
      Description: >-
        Auth0 Management API M2M credentials for the platform-mcp Auth0
        handler. Populated post-deploy by scripts/seed-auth0-secret.ts.
      SecretString: '{"domain":"PLACEHOLDER","client_id":"PLACEHOLDER","client_secret":"PLACEHOLDER"}'

  # ---- Auth0 handler Lambda --------------------------------------------
  Auth0HandlerLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: auth0-handler-platform-mcp
      Description: Auth0 management handler — multiplexes logs/stats/sec/clients/user.
      CodeUri: ../
      Handler: index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: "2012-10-17"
          Statement:
            # Reads ONLY this Lambda's own management-creds secret.
            # Auth0 calls go out over public HTTPS; no DDB, no KMS.
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:platform-mcp/auth0/*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: cjs
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/index.ts

  # ---- Permit the platform Lambda to invoke this Lambda ----------------
  # Created only when the platform stack's role ARN is provided. If the
  # parameter is empty, the deploy script wires the grant in a follow-up
  # step (kept optional so a bare `sam deploy` can succeed before the
  # platform stack exists).
  Auth0HandlerInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasPlatformRoleArn
    Properties:
      FunctionName: !GetAtt Auth0HandlerLambda.Arn
      Action: lambda:InvokeFunction
      Principal: !Ref PlatformMcpLambdaRoleArn

Outputs:
  Auth0HandlerLambdaArn:
    Description: ARN of the Auth0 management Lambda. Pass this to scripts/seed-tool-registry.ts as AUTH0_LAMBDA_ARN.
    Value: !GetAtt Auth0HandlerLambda.Arn
    Export:
      Name: Auth0HandlerLambdaArn

  Auth0HandlerLambdaName:
    Description: Function name (stable; safe to hardcode in cross-stack IAM).
    Value: !Ref Auth0HandlerLambda

  Auth0ManagementCredsSecretArn:
    Description: ARN of the Auth0 management-creds secret. Pass this to scripts/seed-auth0-secret.ts.
    Value: !Ref Auth0ManagementCredsSecret
    Export:
      Name: Auth0ManagementCredsSecretArn
